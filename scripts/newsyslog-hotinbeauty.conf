# newsyslog 로테이션 설정 — macOS 내장 /usr/sbin/newsyslog 사용.
# 설치: sudo cp scripts/newsyslog-hotinbeauty.conf /etc/newsyslog.d/hotinbeauty.conf
# 수동 강제 실행: sudo /usr/sbin/newsyslog -vv
#
# launchd 로 흐르는 무제한 append 로그(*launchd.out.log / *launchd.err.log)와
# date-stamped 크롤 로그(*-YYYY-MM-DD.log) 를 주기 로테이션/삭제한다.
#
# 필드: logfilename [owner:group] mode count size when flags [pid_file] [sig_num]
# - count = 보관할 rotated 파일 개수 (.0 .1 .2 ...)
# - size  = 바이트 단위, 넘으면 로테이션
# - when  = '*' or 'Hourly/Daily/Monthly@hhmmss' 등. '*' 는 size 만 체크
# - flags = G(glob path 해석), Z(gzip), J(bzip2), N(no new file)
#
# 사용자 홈 경로는 /etc/newsyslog.d 에서 glob 으로 풀려면 G 플래그 필수.
# /Users/<you> 를 본인 맥북 사용자명으로 맞춰 배포하거나, 여기 __USER__ placeholder 를
# install-hwahae-launchd.sh 확장으로 치환하는 흐름 둘 중 하나. 현재는 수동 치환.

# ── 화해 크롤 ───────────────────────────────────────────────────────────────
# 무한 append — 5MB 넘으면 rotate, 7개 보관 (약 35MB cap)
/Users/__USER__/Library/Logs/hotinbeauty/hwahae-launchd.out.log  644  7  5120  *  GN
/Users/__USER__/Library/Logs/hotinbeauty/hwahae-launchd.err.log  644  7  5120  *  GN
# date-stamped — 90일 이상이면 삭제 (count=0 + size 로 rotate 대신 aging 용)
# newsyslog 단독으론 '파일 생성 후 N일 초과 삭제' 직접 지원 안 함 → 별도 find 크론으로 처리.

# ── 올영 크롤 (같은 머신 공존) ──────────────────────────────────────────────
/Users/__USER__/Library/Logs/hotinbeauty/launchd.out.log  644  7  5120  *  GN
/Users/__USER__/Library/Logs/hotinbeauty/launchd.err.log  644  7  5120  *  GN
